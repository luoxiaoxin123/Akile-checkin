name: Akile Daily Check-in

on:
  schedule:
    # 北京时间每天 09:00 = UTC 每天 01:00
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run check-in
        env:
          AKILE_EMAIL: ${{ secrets.AKILE_EMAIL }}
          AKILE_PASSWORD: ${{ secrets.AKILE_PASSWORD }}
          AKILE_PUSH_KEY: ${{ secrets.AKILE_PUSH_KEY }}
        run: python Akile-Checkin.py
